name: Build and Deploy webfolio-app
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
      
      - name: Build webfolio-app
        run: npm run build
      
      - name: Create deployment package
        run: |
          # Include node_modules in the package to avoid installing on Pi
          npm ci --omit=dev
          tar -czf webfolio-deployment.tar.gz .next package.json node_modules public
      
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: webfolio-build
          path: webfolio-deployment.tar.gz

  deploy:
    needs: build
    runs-on: self-hosted
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: webfolio-build
      
      - name: Extract and deploy webfolio-app
        run: |
          # Deploy to the directory where PM2 is actually running the app
          cd /home/mallama/Desktop/webfolio
          rm -rf .next node_modules
          tar -xzf $GITHUB_WORKSPACE/webfolio-deployment.tar.gz
          pm2 restart webfolio-app