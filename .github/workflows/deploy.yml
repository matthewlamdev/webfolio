name: Build and Deploy webfolio-app
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build webfolio-app
        run: npm run build
      
      - name: Create deployment package
        run: |
          tar -czf webfolio-deployment.tar.gz .next package.json package-lock.json public
      
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: webfolio-build
          path: webfolio-deployment.tar.gz

  deploy:
    needs: build
    runs-on: self-hosted
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: webfolio-build
      
      - name: Extract and deploy webfolio-app
        run: |
          rm -rf .next
          tar -xzf webfolio-deployment.tar.gz
          npm ci --only=production
          pm2 restart webfolio-app