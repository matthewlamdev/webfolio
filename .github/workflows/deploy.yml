name: Build and Deploy webfolio-app
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
      
      - name: Build webfolio-app
        run: npm run build
      
      - name: Create deployment package
        run: |
          npm ci --omit=dev
          tar -czf webfolio-deployment.tar.gz .next package.json node_modules public

      # Authenticate with Google Cloud using service account key from secrets
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Upload build artifact to GCS
        run: |
          gsutil cp webfolio-deployment.tar.gz gs://${{ secrets.GCP_BUCKET }}/webfolio/${{ github.sha }}/webfolio-deployment.tar.gz

  deploy:
    needs: build
    runs-on: self-hosted
    steps:
      # Authenticate with Google Cloud
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Download build artifact from GCS
        run: |
          gsutil cp gs://${{ secrets.GCP_BUCKET }}/webfolio/${{ github.sha }}/webfolio-deployment.tar.gz ./webfolio-deployment.tar.gz

      - name: Extract and deploy webfolio-app
        run: |
          cd /home/mallama/Desktop/webfolio
          rm -rf .next node_modules
          tar -xzf $GITHUB_WORKSPACE/webfolio-deployment.tar.gz
          pm2 restart webfolio-app